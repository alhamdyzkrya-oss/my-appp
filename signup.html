<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ocp· Create your account</title>
    
    <!-- Google Fonts + Bootstrap Icons (lightweight) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 10% 30%, rgba(15, 157, 88, 0.08), rgba(11, 122, 67, 0.02)),
                        linear-gradient(145deg, #EFF6F0 0%, #F8FBF9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* animated abstract shapes - modern dribbble vibe */
        .bg-shape {
            position: fixed;
            z-index: 0;
            filter: blur(70px);
            opacity: 0.4;
            border-radius: 50%;
            animation: floatShape 18s infinite alternate ease-in-out;
        }

        .shape-1 {
            width: 55vw;
            height: 55vw;
            background: radial-gradient(circle, #0F9D58, #0B7A43);
            top: -20vh;
            right: -15vw;
        }

        .shape-2 {
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, #1976D2, #0D47A1);
            bottom: -25vh;
            left: -20vw;
            animation-delay: -6s;
        }

        .shape-3 {
            width: 35vw;
            height: 35vw;
            background: radial-gradient(circle, #FF6F00, #E65100);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -12s;
        }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 30px) scale(0.95); }
            75% { transform: translate(40px, 20px) scale(1.02); }
        }

        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.08),
                0 8px 32px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            padding: 2.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-card:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 25px 70px rgba(0, 0, 0, 0.12),
                0 12px 40px rgba(0, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #0F9D58, #0B7A43);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 24px rgba(15, 157, 88, 0.3);
            transition: all 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 32px rgba(15, 157, 88, 0.4);
        }

        .brand-logo i {
            font-size: 28px;
            color: white;
        }

        .brand-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .brand-subtitle {
            color: #6B7280;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .form-floating {
            margin-bottom: 1.25rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #374151;
            transition: all 0.2s ease;
            height: auto;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #0F9D58;
            box-shadow: 0 0 0 3px rgba(15, 157, 88, 0.1);
            outline: none;
        }

        .form-control::placeholder {
            color: #9CA3AF;
        }

        .form-floating label {
            color: #6B7280;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .form-floating .form-control:focus ~ label,
        .form-floating .form-control:not(:placeholder-shown) ~ label {
            color: #0F9D58;
        }

        .btn-signup {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #0F9D58, #0B7A43);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(15, 157, 88, 0.3);
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .btn-signup:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(15, 157, 88, 0.4);
            background: linear-gradient(135deg, #0B7A43, #0F9D58);
        }

        .btn-signup:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(0, 0, 0, 0.08);
        }

        .divider span {
            background: rgba(255, 255, 255, 0.95);
            padding: 0 1.5rem;
            color: #6B7280;
            font-size: 0.875rem;
            font-weight: 500;
            position: relative;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
        }

        .auth-footer p {
            color: #6B7280;
            font-size: 0.95rem;
            margin-bottom: 0;
        }

        .auth-footer a {
            color: #0F9D58;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .auth-footer a:hover {
            color: #0B7A43;
            text-decoration: underline;
        }

        .alert {
            border-radius: 12px;
            border: none;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #DC2626;
        }

        .alert-success {
            background: rgba(15, 157, 88, 0.1);
            color: #0F9D58;
        }

        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: #E5E7EB;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-weak { background: #EF4444; width: 33%; }
        .strength-medium { background: #F59E0B; width: 66%; }
        .strength-strong { background: #0F9D58; width: 100%; }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .input-icon i:hover {
            color: #6B7280;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }
            
            .brand-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- animated background shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="auth-container">
        <div class="auth-card">
            <!-- brand header -->
            <div class="brand-header">
                <div class="brand-logo">
                    <i class="bi bi-shield-check"></i>
                </div>
                <h1 class="brand-title">Create Account</h1>
                <p class="brand-subtitle">Join the network security platform</p>
            </div>

            <!-- flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- signup form -->
            <form method="POST" action="{{ url_for('signup') }}" id="signupForm">
                <div class="form-floating">
                    <input type="text" 
                           class="form-control" 
                           id="username" 
                           name="username" 
                           placeholder="Username" 
                           required 
                           pattern="[a-zA-Z0-9_]{3,20}"
                           title="Username must be 3-20 characters, letters, numbers, and underscores only">
                    <label for="username">
                        <i class="bi bi-person me-2"></i>Username
                    </label>
                </div>

                <div class="form-floating">
                    <input type="email" 
                           class="form-control" 
                           id="email" 
                           name="email" 
                           placeholder="Email address" 
                           required>
                    <label for="email">
                        <i class="bi bi-envelope me-2"></i>Email Address
                    </label>
                </div>

                <div class="form-floating input-icon">
                    <input type="password" 
                           class="form-control" 
                           id="password" 
                           name="password" 
                           placeholder="Password" 
                           required 
                           minlength="8">
                    <label for="password">
                        <i class="bi bi-lock me-2"></i>Password
                    </label>
                    <i class="bi bi-eye-slash" id="togglePassword"></i>
                </div>
                
                <div class="password-strength" id="passwordStrength" style="display: none;">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>

                <div class="form-floating input-icon">
                    <input type="password" 
                           class="form-control" 
                           id="confirmPassword" 
                           name="confirm_password" 
                           placeholder="Confirm password" 
                           required>
                    <label for="confirmPassword">
                        <i class="bi bi-lock-fill me-2"></i>Confirm Password
                    </label>
                    <i class="bi bi-eye-slash" id="toggleConfirmPassword"></i>
                </div>

                <button type="submit" class="btn btn-signup" id="signupBtn">
                    <i class="bi bi-person-plus me-2"></i>Create Account
                </button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <!-- footer with login link -->
            <div class="auth-footer">
                <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
            </div>
        </div>
    </div>

    <script>
        // Password visibility toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            }
        });

        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('confirmPassword');
            const icon = this;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            }
        });

        // Password strength indicator
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthContainer = document.getElementById('passwordStrength');
            const strengthBar = document.getElementById('strengthBar');
            
            if (password.length === 0) {
                strengthContainer.style.display = 'none';
                return;
            }
            
            strengthContainer.style.display = 'block';
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            strengthBar.className = 'password-strength-bar';
            if (strength <= 1) {
                strengthBar.classList.add('strength-weak');
            } else if (strength === 2) {
                strengthBar.classList.add('strength-medium');
            } else {
                strengthBar.classList.add('strength-strong');
            }
        });

        // Form validation
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            
            // Check password match
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match. Please try again.');
                return false;
            }
            
            // Check password strength
            if (password.length < 8) {
                e.preventDefault();
                alert('Password must be at least 8 characters long.');
                return false;
            }
            
            // Basic email validation
            if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                e.preventDefault();
                alert('Please enter a valid email address.');
                return false;
            }
            
            // Show loading state
            const submitBtn = document.getElementById('signupBtn');
            submitBtn.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Creating Account...';
            submitBtn.disabled = true;
        });

        // Auto-hide alerts after 5 seconds
        setTimeout(function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                alert.style.opacity = '0';
                setTimeout(function() {
                    alert.remove();
                }, 300);
            });
        }, 5000);
    </script>
</body>
</html>
